name: Generate Snake Animation

on:
  # Berjalan otomatis setiap 24 jam
  schedule:
    - cron: "0 */24 * * *"
  
  # Memungkinkan kamu menjalankan Action ini secara manual dari tab Actions
  workflow_dispatch:
  
  # Berjalan setiap kali ada perubahan (push) di branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Membuat animasi ular berdasarkan kontribusi GitHub kamu
      - name: generate github-contribution-grid-snake.svg
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        
      # Menyimpan hasilnya ke branch terpisah bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}